<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ByPass Ai</title>
  <link rel="stylesheet" href="theme.css?v=6.4.6-new-ui">
  <link rel="stylesheet" href="sidepanel.css?v=6.4.6-new-ui">
</head>
<body>
  <div class="sp-header">
    <div class="sp-brand">
      <svg class="sp-brand-logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="logo-neon-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <linearGradient id="logo-theme-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" />
            <stop offset="50%" stop-color="#ec4899" />
            <stop offset="100%" stop-color="#3b82f6" />
          </linearGradient>
          <linearGradient id="logo-theme-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#06b6d4" />
            <stop offset="100%" stop-color="#6366f1" />
          </linearGradient>
        </defs>
        <!-- Outer Glowing Ring -->
        <circle class="logo-ring-outer" cx="50" cy="50" r="42" fill="none" stroke="url(#logo-theme-grad-1)" stroke-width="3" stroke-dasharray="160 80" stroke-linecap="round" />
        <!-- Orbit 1 (45deg tilted) -->
        <g class="logo-orbit-1-group">
          <ellipse class="logo-orbit-1" cx="50" cy="50" rx="30" ry="10" fill="none" stroke="url(#logo-theme-grad-2)" stroke-width="2" opacity="0.6" />
          <circle class="logo-dot-1" cx="80" cy="50" r="4" fill="#06b6d4" filter="url(#logo-neon-glow)" />
        </g>
        <!-- Orbit 2 (-45deg tilted) -->
        <g class="logo-orbit-2-group">
          <ellipse class="logo-orbit-2" cx="50" cy="50" rx="30" ry="10" fill="none" stroke="url(#logo-theme-grad-2)" stroke-width="2" opacity="0.6" />
          <circle class="logo-dot-2" cx="20" cy="50" r="4" fill="#ec4899" filter="url(#logo-neon-glow)" />
        </g>
        <!-- Pulsing Neural Core -->
        <circle class="logo-core" cx="50" cy="50" r="10" fill="url(#logo-theme-grad-1)" filter="url(#logo-neon-glow)" />
        <polygon class="logo-core-star" points="50,45 52,49 56,50 52,51 50,55 48,51 44,50 48,49" fill="#ffffff" />
      </svg>
      <span class="sp-brand-text">ByPass Ai</span>
      <span class="sp-badge">PRO</span>
    </div>
    <div class="sp-header-actions">
      <button class="sp-icon-btn sp-notif-btn" title="Notifications">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="sp-notif-badge" style="display:none">0</span>
      </button>
      <button class="sp-icon-btn sp-theme-btn" title="Theme">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="sp-icon-btn sp-logout-btn" title="Logout">🚪</button>
    </div>
  </div>
  
  <div class="sp-body" id="sp-body">
    <div class="sp-license-gate" id="sp-loading" style="padding:40px 0;text-align:center">
      <p style="color:var(--ql-text-muted)">⏳ Loading...</p>
    </div>
  </div>

  <div class="sp-footer">
    <button class="sp-back-to-popup" id="sp-back-to-popup" title="Return to floating mode" style="display:none">
      ◀ Popup
    </button>
    <a href="https://t.me/Iamsamkhanofficial" target="_blank" rel="noopener noreferrer" class="sp-support-link" id="sp-support-telegram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
      Support
    </a>
     <span class="sp-footer-badge" id="sp-footer-version"></span>
  </div>

  <div class="sp-notif-panel" id="sp-notif-panel" style="display:none">
    <div class="sp-notif-header">
      <span>Notifications</span>
      <button class="sp-notif-close" id="sp-notif-close">✕</button>
    </div>
    <div class="sp-notif-list" id="sp-notif-list">
      <p class="sp-notif-empty">Loading...</p>
    </div>
  </div>

  <script src="security.js"></script>
  <script src="extension-config.js"></script>
  <script src="lovable-auth.js"></script>
  <script src="lovable-feature-api.js"></script>
  <script src="user-messages.js"></script>
  <script src="jszip.min.js"></script>
  <script src="hwFingerprint.js"></script>
  <script src="license-guard.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="sounds.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
