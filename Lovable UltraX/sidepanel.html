<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lovable UltraX</title>
  <link rel="stylesheet" href="theme.css?v=1783445940">
  <link rel="stylesheet" href="sidepanel.css?v=1783445940">
</head>
<body>
  <div class="sp-header">
    <div class="sp-brand">
      <img src="assets/logo.png" alt="Lovable UltraX Logo" class="sp-brand-logo-img" style="width: 32px; height: 32px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.4)); margin-right: 6px;" />
      <span class="sp-brand-text">Lovable UltraX</span>
      <span class="sp-badge">PRO</span>
    </div>
    <div class="sp-header-actions">
      <button class="sp-icon-btn sp-notif-btn" title="Notifications">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="sp-notif-badge" style="display:none">0</span>
      </button>
      <button class="sp-icon-btn sp-theme-btn" title="Theme">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="sp-icon-btn sp-logout-btn" title="Logout">🚪</button>
    </div>
  </div>
  
  <div class="sp-body" id="sp-body">
    <div id="sp-update-banner" style="display:none"></div>
    <div class="sp-profile-card">
      <div class="sp-profile-top"><span class="sp-profile-name" id="sp-name">Preview User</span><span class="sp-status-badge sp-badge-pro">PRO</span></div>
      <div class="sp-sync-status" id="sp-sync">Synced with Lovable</div>
      <div class="sp-trial-countdown" id="sp-countdown" style="display:none"></div>
    </div>
    <div id="sp-admin-banner" class="sp-admin-banner" style="display:none"></div>
    
    <div class="sp-tabs">
      <button class="sp-tab sp-tab-active" data-tab="prompt">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Prompt
      </button>
      <button class="sp-tab" data-tab="history">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> History
      </button>
    </div>
    
    <div id="sp-tab-content">
      <textarea class="sp-textarea" id="sp-msg" rows="3" placeholder="Type your command..." spellcheck="false"></textarea>
      <div id="sp-attach-preview" class="sp-attach-preview" style="display:none"></div>
      <div class="sp-action-bar">
        <div class="sp-action-left"><label class="sp-toggle"><input type="checkbox" id="sp-modo-plano"><span class="sp-toggle-slider"></span></label><span class="sp-toggle-label">Plan</span></div>
        <div class="sp-action-center">
          <button class="sp-attach-btn" id="sp-attach-btn" title="Attach file">📎</button>
          <button class="sp-tool-btn" id="sp-optimize" title="Optimize with AI">✨</button>
          <button class="sp-tool-btn" id="sp-speech" title="Voice">🎤</button>
        </div>
        <button class="sp-send-btn" id="sp-send">Send</button>
      </div>
      <div class="sp-log" id="sp-log"></div>
      <span class="sp-shortcuts-title">QUICK SHORTCUTS</span>
      <div class="sp-shortcuts-grid" id="sp-chips">
          <button class="sp-chip">🐛 Bugs</button>
          <button class="sp-chip">♻️ Refactor</button>
          <button class="sp-chip">🛡️ Errors</button>
          <button class="sp-chip">⚡ Optimize</button>
          <button class="sp-chip">💬 Comments</button>
          <button class="sp-chip">📈 SEO</button>
          <button class="sp-chip">🎨 UI</button>
          <button class="sp-chip">📦 Components</button>
          <button class="sp-chip">🔍 Review</button>
      </div>
      
      <button id="sp-shield-btn" class="sp-shield-btn"><span id="sp-shield-label">🛡️ Enable Shield</span></button>
      <button id="sp-bypass-btn" class="sp-shield-btn"><span id="sp-bypass-label">⚡ Enable Credit Bypass</span></button>
      <button id="sp-native-chat-btn" class="sp-shield-btn sp-btn-feature sp-btn-native-chat"><span id="sp-native-chat-label">💬 Use Native Chat</span></button>
      
      <button type="button" class="sp-advanced-toggle" id="sp-advanced-toggle" aria-expanded="true" aria-controls="sp-advanced-panel">
        <span class="sp-advanced-toggle-label">⚙️ Advanced Options</span>
        <span class="sp-advanced-chevron" aria-hidden="true">▾</span>
      </button>
      <div class="sp-advanced-panel" id="sp-advanced-panel" style="display:block">
        <button id="sp-remove-watermark" class="sp-watermark-btn">🚫 Remove Watermark</button>
        <button id="sp-download-project" class="sp-watermark-btn sp-btn-feature sp-btn-download">💾 Download Source Code</button>
        <button id="sp-quick-init" class="sp-watermark-btn sp-btn-feature sp-btn-quick-init">🚀 Create New Project</button>
        <span class="sp-shortcuts-title sp-section-label">Powerkits Features</span>
        <button id="sp-publish-project" class="sp-watermark-btn sp-btn-feature sp-btn-publish">🌐 Publish Project</button>
        <button id="sp-enable-cloud" class="sp-watermark-btn sp-btn-feature sp-btn-cloud">☁️ Enable Lovable Cloud</button>
      </div>
      <div id="sp-download-status" class="sp-log" style="display:none"></div>
    </div>
  </div>

  <div class="sp-footer">
    <button class="sp-back-to-popup" id="sp-back-to-popup" title="Return to floating mode" style="display:none">
      ◀ Popup
    </button>
    <a href="https://ottsathi.com/products/lovable-ultrax-extension-licence" target="_blank" rel="noopener noreferrer" class="sp-support-link" id="sp-support-telegram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
      Support
    </a>
     <span class="sp-footer-badge" id="sp-footer-version"></span>
  </div>

  <div class="sp-notif-panel" id="sp-notif-panel" style="display:none">
    <div class="sp-notif-header">
      <span>Notifications</span>
      <button class="sp-notif-close" id="sp-notif-close">✕</button>
    </div>
    <div class="sp-notif-list" id="sp-notif-list">
      <p class="sp-notif-empty">Loading...</p>
    </div>
  </div>

  <script src="security.js"></script>
  <script src="extension-config.js"></script>
  <script src="lovable-auth.js"></script>
  <script src="lovable-feature-api.js"></script>
  <script src="user-messages.js"></script>
  <script src="jszip.min.js"></script>
  <script src="hwFingerprint.js"></script>
  <script src="license-guard.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="sounds.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
